<!DOCTYPE html>
<html>
<head>
  <title>Debugify - Editor</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #1e3c72, #2a5298, #0f2027, #203a43);
      background-size: 400% 400%;
      animation: bg 10s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    @keyframes bg {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      width: 500px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      padding: 25px;
      border-radius: 20px;
    }

    textarea {
      width: 100%;
      height: 160px;
      border-radius: 10px;
      padding: 10px;
      font-family: monospace;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    .output {
      margin-top: 10px;
      background: black;
      padding: 10px;
      height: 120px;
    }

    .error { color: red; }
    .success { color: #00ff99; }
  </style>
</head>

<body>

<div class="container">
  <h2>💻 Debugify</h2>

  <textarea id="code"></textarea>

  <select id="lang">
    <option value="c">C</option>
    <option value="python">Python</option>
  </select>

  <button onclick="checkError()">Check Error</button>

  <div id="output" class="output"></div>

  <button onclick="logout()">Logout</button>
</div>

<script>
function checkError() {
  let code = document.getElementById("code").value.toLowerCase();
  let lang = document.getElementById("lang").value;
  let output = document.getElementById("output");

  let errors = [];

  if (lang === "c") {
    if (!code.includes("#include")) errors.push("Missing #include");
    if (code.includes("printf") && !code.includes(";")) errors.push("Missing ;");
  }

  if (lang === "python") {
    if (code.includes("for") && !code.includes(":")) errors.push("Missing ':'");
  }

  if (errors.length > 0) {
    output.innerHTML = errors.map(e => <div class='error'>❌ ${e}</div>).join("");
  } else {
    output.innerHTML = "<div class='success'>✅ No errors</div>";
  }
}

function logout() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
