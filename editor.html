<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugLens</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#e2e8f0;
}

.top{
padding:10px;
background:#111827;
display:flex;
gap:8px;
flex-wrap:wrap;
align-items:center;
}

select,input,button{
padding:8px;
border:none;
border-radius:6px;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button.fix{
background:#3b82f6;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.editor{
width:50%;
display:flex;
background:#0b1220;
}

.lines{
width:50px;
background:#111827;
padding:10px;
text-align:right;
font-size:12px;
color:#64748b;
}

textarea{
width:100%;
background:#0b1220;
color:white;
border:none;
outline:none;
padding:10px;
font-family:monospace;
font-size:14px;
resize:none;
}

.panel{
width:50%;
padding:10px;
overflow:auto;
border-left:1px solid #1f2937;
}

.box{
background:#0b1220;
padding:10px;
border-radius:8px;
white-space:pre-wrap;
margin-top:10px;
}

.error{
background:#1e293b;
border-left:4px solid red;
padding:8px;
margin:6px 0;
}

.ok{
color:#22c55e;
}

.savedItem{
display:flex;
justify-content:space-between;
background:#111827;
padding:6px;
margin-top:5px;
border-radius:6px;
}
</style>

</head>

<body>

<div class="top">

<select id="lang">
<option value="python">Python</option>
<option value="c">C</option>
</select>

<button onclick="checkCode()">Check</button>
<button onclick="runCode()">Run</button>
<button onclick="showSuggestions()">Suggestions</button>

<input id="projName" placeholder="Project name">
<button onclick="saveProject()">Save</button>

</div>

<div class="container">

<div class="editor">
<div class="lines" id="lines">1</div>
<textarea id="code"></textarea>
</div>

<div class="panel">

<div id="out" class="ok">Write code and run</div>

<div style="margin-top:10px">
<b>Saved Projects</b>
<div id="savedList"></div>
</div>

</div>
</div>

<script>

const code=document.getElementById("code");
const lines=document.getElementById("lines");
const out=document.getElementById("out");
const savedList=document.getElementById("savedList");
const lang=document.getElementById("lang");

code.addEventListener("input", updateLines);

function updateLines(){
let c=code.value.split("\n").length;
let t="";
for(let i=1;i<=c;i++) t+=i+"<br>";
lines.innerHTML=t;
}

/* SAFE SAVE */
function saveProject(){
let name=document.getElementById("projName").value.trim();
if(!name){alert("Enter project name");return;}

let store=JSON.parse(localStorage.getItem("buglens")||"{}");

store[name]={
code:code.value||"",
lang:lang.value
};

localStorage.setItem("buglens",JSON.stringify(store));
loadSaved();
}

/* SAFE LOAD */
function loadSaved(){
let store=JSON.parse(localStorage.getItem("buglens")||"{}");
savedList.innerHTML="";

for(let k in store){

let d=document.createElement("div");
d.className="savedItem";

let span=document.createElement("span");
span.innerText=k;

let openBtn=document.createElement("button");
openBtn.innerText="Open";
openBtn.onclick=()=>openP(k);

let delBtn=document.createElement("button");
delBtn.innerText="X";
delBtn.onclick=()=>delP(k);

d.appendChild(span);
d.appendChild(openBtn);
d.appendChild(delBtn);

savedList.appendChild(d);
}
}

/* OPEN */
function openP(name){
let store=JSON.parse(localStorage.getItem("buglens")||"{}");
if(!store[name]) return;

code.value=store[name].code||"";
lang.value=store[name].lang||"python";
updateLines();
}

/* DELETE */
function delP(name){
let store=JSON.parse(localStorage.getItem("buglens")||"{}");
if(!store[name]) return;

delete store[name];
localStorage.setItem("buglens",JSON.stringify(store));
loadSaved();
}

/* CHECK */
function checkCode(){
let c=code.value;
let err=[];

if(!c.trim()){
out.innerHTML="<div class='error'>Empty code</div>";
return;
}

if((c.match(/\(/g)||[]).length!=(c.match(/\)/g)||[]).length)
err.push("Bracket mismatch");

if((c.match(/\{/g)||[]).length!=(c.match(/\}/g)||[]).length)
err.push("Brace mismatch");

/* PYTHON */
if(lang.value==="python"){
let l=c.split("\n");

for(let i=0;i<l.length;i++){
if(l[i].trim().endsWith(":")){
if(l[i+1] && !l[i+1].startsWith(" ")){
err.push("Indentation missing at line "+(i+1));
}
}
}
}

/* C */
if(lang.value==="c"){
if(!c.includes("#include")) err.push("Missing #include");
if(!c.includes("main")) err.push("Missing main()");
if(!c.includes("printf")) err.push("No output (printf missing)");
}

if(err.length){
out.innerHTML="<div class='error'>"+err.join("<br>")+"</div>";
}else{
out.innerHTML="<div class='ok'>No issues found 🎉</div>";
}
}

/* 🔥 FIXED RUN (NO more “code may be incomplete” wrongly) */
function runCode(){
let c=code.value.trim();

/* empty check */
if(!c){
out.innerHTML="<div class='error'>Code is empty</div>";
return;
}

/* PYTHON */
if(lang.value==="python"){
try{
let result=Function("return (async ()=>{"+c+"})()")();
out.innerHTML="<div class='box'>Running...</div>";
setTimeout(()=>{ out.innerHTML="<div class='box'>✔ Executed</div>"; },500);
}catch(e){
out.innerHTML="<div class='error'>Code may be incomplete or invalid</div>";
}
return;
}

/* C SIMULATION */
let output=[];

if(c.includes("printf")){
let m=c.match(/\"(.*?)\"/g);
if(m) m.forEach(x=>output.push(x.replace(/\"/g,"")));
}

if(output.length){
out.innerHTML="<div class='box'>"+output.join("\n")+"</div>";
}else{
out.innerHTML="<div class='box'>✔ Code executed (no output detected)</div>";
}
}

/* 🔥 SUGGESTIONS RESTORED */
function showSuggestions(){
let c=code.value;
let s=[];

if(c.includes("main") && !c.includes("return"))
s.push("Add return 0;");

if(lang.value==="c" && !c.includes("printf"))
s.push("Add printf() to show output");

if(lang.value==="python" && c.includes("for") && !c.includes("print"))
s.push("Add print() inside loop");

out.innerHTML="<div class='box'>"+(s.length?s.join("<br>"):"No suggestions 🎉")+"</div>";
}

updateLines();
loadSaved();

</script>

</body>
</html>
