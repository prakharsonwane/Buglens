<!DOCTYPE html>
<html>
<head>
<title>Test Pyodide</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
</head>
<body>

<textarea id="code" rows="6" cols="40">print("hello")</textarea>
<br>
<button onclick="run()">Run</button>

<pre id="out">loading...</pre>

<script>

let pyodide;

async function init(){
pyodide = await loadPyodide({
indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/"
});
document.getElementById("out").innerText = "ready";
}

init();

async function run(){
try{
let code = document.getElementById("code").value;
let result = await pyodide.runPythonAsync(code);
document.getElementById("out").innerText = result || "no output";
}catch(e){
document.getElementById("out").innerText = e;
}
}

</script>

</body>
</html>
