<!DOCTYPE html>
<html>
<head>
  <title>Debugify - Editor</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #1e3c72, #2a5298, #0f2027, #203a43);
      background-size: 400% 400%;
      animation: bg 10s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    @keyframes bg {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      width: 520px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    textarea {
      width: 100%;
      height: 170px;
      border-radius: 10px;
      padding: 10px;
      font-family: monospace;
      outline: none;
      border: none;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .output {
      margin-top: 10px;
      background: black;
      padding: 10px;
      height: 140px;
      overflow: auto;
      border-radius: 10px;
    }

    .error { color: red; }
    .success { color: #00ff99; }

    .highlight {
      border: 2px solid red;
      box-shadow: 0 0 10px red;
    }

    .logout {
      background: #ff4d4d;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>💻 Debugify</h2>

  <textarea id="code" placeholder="Paste your code here..."></textarea>

  <select id="lang">
    <option value="c">C</option>
    <option value="python">Python</option>
  </select>

  <button onclick="checkError()">Check Error</button>

  <div id="output" class="output"></div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
function checkError() {
  let codeBox = document.getElementById("code");
  let code = codeBox.value;
  let lang = document.getElementById("lang").value;
  let output = document.getElementById("output");

  let errors = [];
  codeBox.classList.remove("highlight");

  let lines = code.split("\n");

  // ===== C LANGUAGE =====
  if (lang === "c") {

    if (!code.includes("#include")) {
      errors.push("Missing #include statement");
    }

    if (!code.includes("main")) {
      errors.push("Missing main() function");
    }

    lines.forEach(function(line, i) {
      let l = line.trim();

      if (l.includes("printf") && !l.endsWith(";")) {
        errors.push("Line " + (i+1) + ": Missing semicolon in printf");
      }

      if (l.includes("scanf") && !l.includes("&")) {
        errors.push("Line " + (i+1) + ": scanf needs & before variable");
      }
    });

    let open = (code.match(/{/g) || []).length;
    let close = (code.match(/}/g) || []).length;

    if (open !== close) {
      errors.push("Bracket mismatch { }");
    }
  }

  // ===== PYTHON =====
  if (lang === "python") {

    lines.forEach(function(line, i) {
      let l = line.trim();

      if (l.startsWith("for") && !l.endsWith(":")) {
        errors.push("Line " + (i+1) + ": Missing ':' in for loop");
      }

      if (l.startsWith("if") && !l.endsWith(":")) {
        errors.push("Line " + (i+1) + ": Missing ':' in if");
      }

      if (l.startsWith("while") && !l.endsWith(":")) {
        errors.push("Line " + (i+1) + ": Missing ':' in while");
      }

      if (l.includes("print") && l.includes(";")) {
        errors.push("Line " + (i+1) + ": Remove semicolon in Python");
      }

      if (l.includes("{") || l.includes("}")) {
        errors.push("Line " + (i+1) + ": Curly brackets not used in Python");
      }

      if (l.startsWith("print") && !l.includes("(")) {
        errors.push("Line " + (i+1) + ": print needs brackets");
      }

      if (i > 0 && lines[i-1].trim().endsWith(":")) {
        if (!line.startsWith(" ")) {
          errors.push("Line " + (i+1) + ": indentation missing");
        }
      }
    });
  }

  // Remove duplicate errors
  errors = [...new Set(errors)];

  // Limit errors (max 6)
  if (errors.length > 6) {
    errors = errors.slice(0, 6);
  }

  // ===== OUTPUT =====
  if (errors.length > 0) {
    codeBox.classList.add("highlight");

    let result = "";
    errors.forEach(function(e) {
      result += "<div class='error'>❌ " + e + "</div>";
    });

    output.innerHTML = result;

  } else {
    output.innerHTML = "<div class='success'>✅ No errors found 🎉</div>";
  }
}

function logout() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
