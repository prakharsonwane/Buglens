<!DOCTYPE html>
<html>
<head>
  <title>Debugify - Editor</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #1e3c72, #2a5298, #0f2027, #203a43);
      background-size: 400% 400%;
      animation: bg 10s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    @keyframes bg {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      width: 500px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 160px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      margin-top: 10px;
      resize: none;
      outline: none;
      font-family: monospace;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .output {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      height: 130px;
      overflow: auto;
      background: black;
    }

    .error {
      color: red;
    }

    .success {
      color: #00ff99;
    }

    .highlight {
      border: 2px solid red;
      box-shadow: 0 0 10px red;
    }

    .logout {
      background: #ff4d4d;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>💻 Debugify</h2>

  <textarea id="code" placeholder="Paste or type your code here..."></textarea>

  <select id="lang">
    <option value="c">C</option>
    <option value="python">Python</option>
  </select>

  <button onclick="checkError()">Check Error</button>

  <div id="output" class="output"></div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
function checkError() {
  let codeBox = document.getElementById("code");
  let code = codeBox.value;
  let lang = document.getElementById("lang").value;
  let output = document.getElementById("output");

  let errors = [];
  codeBox.classList.remove("highlight");

  // ================= C =================
  if (lang === "c") {
    if (!code.includes("#include")) {
      errors.push("Missing #include statement");
    }

    if (!code.includes("main")) {
      errors.push("Missing main() function");
    }

    if (code.includes("printf") && !code.includes(";")) {
      errors.push("Missing semicolon (;) in printf");
    }

    if (code.includes("scanf") && !code.includes("&")) {
      errors.push("scanf me & lagana hota hai");
    }

    if (code.includes("{") && !code.includes("}")) {
      errors.push("Missing closing bracket }");
    }
  }

  // ================= PYTHON =================
  if (lang === "python") {
    if (code.includes("for") && !code.includes(":")) {
      errors.push("Missing ':' in loop");
    }

    if (code.includes("if") && !code.includes(":")) {
      errors.push("Missing ':' in if statement");
    }

    if (code.includes("while") && !code.includes(":")) {
      errors.push("Missing ':' in while loop");
    }

    if (code.includes("print") && code.includes(";")) {
      errors.push("Python me semicolon nahi hota");
    }

    if (code.includes("{") || code.includes("}")) {
      errors.push("Python me {} use nahi hote");
    }

    if (code.includes("for") && !code.includes("    ")) {
      errors.push("Indentation missing ho sakta hai");
    }
  }

  // ================= OUTPUT =================
  if (errors.length > 0) {
    codeBox.classList.add("highlight");

    let result = "";
    errors.forEach(e => {
      result += "<div class='error'>❌ " + e + "</div>";
    });

    output.innerHTML = result;

  } else {
    output.innerHTML = "<div class='success'>✅ No common errors found</div>";
  }
}

function logout() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
