<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugLens IDE</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#e2e8f0;}
.top{padding:10px;background:#111827;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
select,input,button{padding:8px;border:none;border-radius:6px;}
button{background:#22c55e;color:white;cursor:pointer;}
button.icon{background:#334155;}
.container{display:flex;height:calc(100vh - 60px);}
.editor{width:50%;display:flex;background:#0b1220;}
.lines{width:50px;background:#111827;padding:10px;text-align:right;font-size:12px;color:#64748b;}
textarea{width:100%;background:#0b1220;color:white;border:none;outline:none;padding:10px;font-family:monospace;font-size:14px;resize:none;}
.panel{width:50%;padding:10px;overflow:auto;border-left:1px solid #1f2937;}
.box{background:#0b1220;padding:10px;border-radius:8px;white-space:pre-wrap;}
.error{background:#1e293b;border-left:4px solid red;padding:8px;margin:6px 0;}
.ok{color:#22c55e;}
</style>

</head>
<body>

<div class="top">

<select id="lang">
<option value="python">Python</option>
<option value="c">C</option>
</select>

<button onclick="checkCode()">Check</button>
<button onclick="runCode()">Run</button>
<button onclick="showSuggestions()">Suggestions</button>

<button class="icon" onclick="undo()">↶ Undo</button>
<button class="icon" onclick="redo()">↷ Redo</button>

</div>

<div class="container">

<div class="editor">
<div class="lines" id="lines">1</div>
<textarea id="code" oninput="pushHistory();updateLines()"></textarea>
</div>

<div class="panel">

<div id="out" class="ok">Write code and run</div>

</div>
</div>

<script>

const code=document.getElementById("code");
const lines=document.getElementById("lines");
const out=document.getElementById("out");
const lang=document.getElementById("lang");

/* ---------------- HISTORY ---------------- */
let history=[];
let redoStack=[];

function pushHistory(){
history.push(code.value);
if(history.length>50) history.shift();
redoStack=[];
}

function undo(){
if(history.length>1){
redoStack.push(history.pop());
code.value=history[history.length-1]||"";
updateLines();
}
}

function redo(){
if(redoStack.length){
let v=redoStack.pop();
history.push(v);
code.value=v;
updateLines();
}
}

/* ---------------- LINE ---------------- */
function updateLines(){
let c=code.value.split("\n").length;
let t="";
for(let i=1;i<=c;i++) t+=i+"<br>";
lines.innerHTML=t;
}

/* ---------------- CHECK ---------------- */
function checkCode(){
let c=code.value;
let err=[];

if(!c.trim()){
out.innerHTML="<div class='error'>Empty code</div>";
return;
}

if((c.match(/\(/g)||[]).length!=(c.match(/\)/g)||[]).length)
err.push("Bracket mismatch");

if((c.match(/\{/g)||[]).length!=(c.match(/\}/g)||[]).length)
err.push("Brace mismatch");

if(lang.value==="c"){
if(!c.includes("main")) err.push("Missing main()");
if(!c.includes("printf")) err.push("No printf found");
}

if(err.length)
out.innerHTML="<div class='error'>"+err.join("<br>")+"</div>";
else
out.innerHTML="<div class='ok'>No issues found 🎉</div>";
}

/* ---------------- SUGGESTIONS (SAFE MODE) ---------------- */
function showSuggestions(){
let c=code.value;
let s=[];

if(lang.value==="c"){
if(c.includes("stdio") && !c.includes("stdio.h"))
s.push("Add #include <stdio.h>");

if(c.includes("main") && !c.includes("return"))
s.push("Add return 0;");

if(!c.includes("printf"))
s.push("Add printf() for output");
}

if(s.length===0){
out.innerHTML="<div class='ok'>No suggestions 🎉</div>";
return;
}

out.innerHTML=`
<div class="box">
🔧 Suggestions:<br><br>
${s.map(x=>"• "+x).join("<br>")}<br><br>
⚠ Safe mode (no auto changes)
</div>
`;
}

/* ---------------- RUN ENGINE ---------------- */
function runCode(){
let c=code.value;
let output=[];

/* PYTHON SIMPLE */
if(lang.value==="python"){
let lines=c.split("\n");
for(let l of lines){
l=l.trim();
if(l.startsWith("print(")){
output.push(l.slice(6,-1));
}
}
}

/* C SIMPLE FIXED PRINTF */
if(lang.value==="c"){
let match=c.match(/printf\s*\("([^"]*)"(?:\s*,\s*([^)]+))?\)/);

if(match){
let text=match[1];
let val=match[2];

if(val){
try{ val=eval(val); }catch(e){}
text=text.replace("%d",val);
}

output.push(text);
}
}

let final="(no output)";

if(output.length>0) final=output.join("\n");
else final="⚠ code may be incomplete";

out.innerHTML="<div class='box'>"+final+"</div>";
}

/* INIT */
pushHistory();
updateLines();

</script>

</body>
</html>
