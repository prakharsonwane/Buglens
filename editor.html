<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Debugify</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.top{padding:10px;background:#111827;display:flex;gap:8px;flex-wrap:wrap;}
button,select{padding:8px;border-radius:6px;border:none;}
button{cursor:pointer;background:#22c55e;color:white;}
button.gray{background:#334155;}
.container{display:flex;height:calc(100vh - 60px);}
textarea{width:50%;padding:10px;background:#0b1220;color:white;border:none;outline:none;font-family:monospace;}
.output{width:50%;padding:10px;overflow:auto;border-left:1px solid #1f2937;}
.box{background:#0b1220;padding:10px;border-radius:6px;white-space:pre-wrap;}
.error{color:#f87171;}
.ok{color:#4ade80;}
</style>

</head>
<body>

<div class="top">

<select id="lang">
<option value="python">Python</option>
<option value="c">C</option>
</select>

<button onclick="runCode()">Run</button>
<button onclick="checkCode()">Check</button>
<button onclick="showSuggestions()">Suggest</button>

<button onclick="undo()" class="gray">↶ Undo</button>
<button onclick="redo()" class="gray">↷ Redo</button>

<button onclick="saveCode()" class="gray">💾 Save</button>
<button onclick="loadCode()" class="gray">📂 Load</button>

</div>

<div class="container">
<textarea id="code" oninput="pushHistory()"></textarea>
<div class="output" id="out">Write code...</div>
</div>

<script>

const code=document.getElementById("code");
const out=document.getElementById("out");
const lang=document.getElementById("lang");

/* ---------------- HISTORY ---------------- */
let history=[];
let redoStack=[];

function pushHistory(){
history.push(code.value);
if(history.length>50) history.shift();
redoStack=[];
}

/* ---------------- UNDO / REDO ---------------- */
function undo(){
if(history.length>1){
redoStack.push(history.pop());
code.value=history[history.length-1]||"";
}
}

function redo(){
if(redoStack.length){
let v=redoStack.pop();
history.push(v);
code.value=v;
}
}

/* ---------------- SAVE / LOAD ---------------- */
function saveCode(){
localStorage.setItem("buglens_code", code.value);
out.innerHTML="<div class='ok'>Code Saved ✅</div>";
}

function loadCode(){
let data=localStorage.getItem("buglens_code");
if(data){
code.value=data;
pushHistory();
out.innerHTML="<div class='ok'>Code Loaded 📂</div>";
}
}

/* ---------------- CHECK ---------------- */
function checkCode(){
let c=code.value;
let err=[];

if(!c.trim()) err.push("Empty code");

if((c.match(/\(/g)||[]).length!=(c.match(/\)/g)||[]).length)
err.push("Bracket mismatch");

if(lang.value==="c"){
if(!c.includes("main")) err.push("Missing main()");
}

out.innerHTML=err.length?
"<div class='error'>"+err.join("<br>")+"</div>":
"<div class='ok'>No issues 🎉</div>";
}

/* ---------------- SUGGESTIONS ---------------- */
function showSuggestions(){
let c=code.value;
let s=[];

if(lang.value==="c"){
if(!c.includes("#include <stdio.h>")) s.push("Add #include <stdio.h>");
if(!c.includes("return")) s.push("Add return 0;");
if(!c.includes("printf")) s.push("Add printf()");
}

out.innerHTML=s.length?
"<div class='box'>🔧 Suggestions:<br>"+s.map(x=>"• "+x).join("<br>")+"</div>":
"<div class='ok'>All good 🎉</div>";
}

/* ---------------- RUN ---------------- */
function runCode(){
let c=code.value;
let output=[];

/* PYTHON SIMPLE */
if(lang.value==="python"){
c.split("\n").forEach(l=>{
l=l.trim();
if(l.startsWith("print(")){
output.push(l.slice(6,-1));
}
});
}

/* C FIXED PRINTF */
if(lang.value==="c"){
let m=c.match(/printf\s*\("([^"])"(?:\s,\s*([^)]+))?\)/);

if(m){
let text=m[1];
let val=m[2];

if(val){
try{val=eval(val);}catch(e){}
text=text.replace("%d",val);
}

output.push(text);
}
}

out.innerHTML="<div class='box'>"+
(output.length?output.join("\n"):"⚠ code may be incomplete")+
"</div>";
}

/* INIT */
pushHistory();

</script>

</body>
</html>
