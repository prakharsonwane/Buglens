<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugLens</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #111827, #0b1220);
color:#e2e8f0;
}

/* ---------- TOP BAR ---------- */
.top{
padding:10px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
position:sticky;
top:0;
z-index:100;
}

input,button{
padding:8px;
border:none;
border-radius:6px;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
margin:2px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

button:hover{
opacity:0.85;
transform:scale(1.03);
transition:0.2s;
}

button.fix{
background:#3b82f6;
}

/* ---------- LAYOUT ---------- */
.container{
display:flex;
height:calc(100vh - 60px);
}

.editor{
width:50%;
display:flex;
background:#0b1220;
}

.lines{
width:50px;
background:#111827;
padding:10px;
text-align:right;
color:#94a3b8;
font-size:12px;
}

textarea{
width:100%;
background:#0b1220;
color:white;
border:none;
padding:10px;
font-family:monospace;
caret-color:#22c55e;
}

textarea:focus{
outline:none;
box-shadow:0 0 10px #22c55e;
}

/* ---------- PANEL 50-50 ---------- */
.panel{
width:50%;
display:flex;
flex-direction:column;
background:#0b1220;
border-left:2px solid #22c55e;
transition:0.3s;
}

/* ---------- OUTPUT ---------- */
.outputBox{
flex:1;
display:flex;
flex-direction:column;
border-bottom:1px solid #1f2937;
padding:10px;
}

#out{
flex:1;
overflow:auto;
font-family:monospace;
font-size:14px;
}

/* ---------- SAVE ---------- */
.saveBox{
flex:1;
display:flex;
flex-direction:column;
padding:10px;
overflow:auto;
}

.savedItem{
display:flex;
justify-content:space-between;
background:#111827;
padding:6px;
margin-top:5px;
border-radius:6px;
}

.savedItem:hover{
background:#1e293b;
cursor:pointer;
}

/* ---------- HEADINGS ---------- */
h3{
margin:0 0 5px 0;
font-size:14px;
color:#22c55e;
}

/* ---------- OUTPUT BOX ---------- */
.box{
background:#020617;
padding:10px;
border-radius:8px;
margin-top:10px;
animation: fadeIn 0.2s;
border-left:4px solid #22c55e; /* green */
}

.error{
background:#1e293b;
border-left:4px solid #ef4444;
padding:8px;
margin-top:10px;
}

/* ---------- STATUS ---------- */
.status{
position:fixed;
bottom:0;
width:100%;
background:#111827;
padding:5px;
font-size:12px;
color:#94a3b8;
}

/* ---------- ANIMATION ---------- */
@keyframes fadeIn{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="top">

<div>
<button onclick="undo()" title="Undo">&#8630;</button>
<button onclick="redo()" title="Redo">&#8631;</button>
<button onclick="checkCode()">Check</button>
<button onclick="runCode()">Run</button>
<button class="fix" onclick="showSuggestions()">Suggestions</button>
</div>

<div>
<button onclick="clearAll()">Clear</button>
<input id="projName" placeholder="Project name">
<button onclick="saveProject()">Save</button>
</div>

</div>

<div class="container">

<div class="editor">
<div class="lines" id="lines">1</div>
<textarea id="code" oninput="updateLines(); saveState()"></textarea>
</div>

<div class="panel">

<div class="outputBox">
<h3>Output</h3>
<div id="out">Write code and run</div>
</div>

<div class="saveBox">
<h3>Saved Projects</h3>
<div id="savedList"></div>
</div>

</div>

</div>

<div class="status" id="status">Ready</div>

<script>

let pyodide;

async function init(){
pyodide = await loadPyodide({
indexURL:"https://cdn.jsdelivr.net/pyodide/v0.25.1/full/"
});
}
init();

const code=document.getElementById('code');
const out=document.getElementById('out');
const savedList=document.getElementById('savedList');

/* ---------- STATUS ---------- */
function setStatus(msg){
document.getElementById("status").innerText = msg;
}

/* ---------- LINES ---------- */
function updateLines(){
let count=code.value.split('\n').length;
let html="";
for(let i=1;i<=count;i++) html+=i+"<br>";
document.getElementById('lines').innerHTML=html;
}

/* ---------- UNDO REDO ---------- */
let history=[];
let redoStack=[];

function saveState(){
history.push(code.value);
redoStack=[];
}

function undo(){
if(history.length>1){
redoStack.push(history.pop());
code.value=history[history.length-1]||"";
updateLines();
}
}

function redo(){
if(redoStack.length>0){
let state=redoStack.pop();
history.push(state);
code.value=state;
updateLines();
}
}

/* ---------- RUN ---------- */
async function runPython(c){
try{

out.innerHTML="<div class='box'>⏳ Running...</div>";
setStatus("Running...");

pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

await pyodide.runPythonAsync(c);

let result = pyodide.runPython("sys.stdout.getvalue()").trim();

out.innerHTML = result
? "<div class='box'>"+result+"</div>"
: "<div class='error'>no output</div>";

setStatus("Completed");
out.scrollTop = out.scrollHeight;

}catch(e){
out.innerHTML="<div class='error'>⚠️ Code may be incomplete or incorrect </div>";
setStatus("Error");
}
}

function runCode(){
let c=code.value.trim();
if(!c){
out.innerHTML="Code is empty";
return;
}
runPython(c);
}

/* ---------- CHECK ---------- */
function checkCode(){
let c=code.value;
let err=[];

if(!c.trim()) err.push("Empty code");

if((c.match(/\(/g)||[]).length!=(c.match(/\)/g)||[]).length)
err.push("Bracket mismatch");

let keywords=["if","for","while","def","elif","else"];
let lines=c.split("\n");

for(let i=0;i<lines.length;i++){
let line=lines[i].trim();

for(let kw of keywords){
if(line.startsWith(kw) && !line.endsWith(":")){
err.push("Line "+(i+1)+": missing ':'");
}
}
}

/* lowercase */
let pythonKeywords=["if","for","while","def","elif","else","print","import","return"];

for(let i=0;i<lines.length;i++){
let words=lines[i].split(/\s+/);
for(let w of words){
let lower=w.toLowerCase();
if(pythonKeywords.includes(lower) && w!==lower){
err.push("Line "+(i+1)+": use '"+lower+"'");
}
}
}

/* indentation */
for(let i=1;i<lines.length;i++){
let prev=lines[i-1];
let line=lines[i];
if(prev && prev.trim().endsWith(":")){
if(line.trim()!=="" && !line.startsWith(" ") && !line.startsWith("\t")){
err.push("Line "+(i+1)+": indentation error");
}
}
}

out.innerHTML = err.length
? "<div class='error'>"+err.join("<br>")+"</div>"
: "<div class='box'>Syntax looks good 🎉</div>";
}

/* ---------- SUGGEST ---------- */
function showSuggestions(){
let c=code.value;
let s=[];

if(c.includes("for") && !c.includes("print")) s.push("Add print() in loop");
if(c.includes("def") && !c.includes("return")) s.push("Function may need return");
if(!c.includes("print")) s.push("Add print()");

out.innerHTML="<div class='box'>"+(s.length?s.join("<br>"):"All good 👍")+"</div>";
}

/* ---------- SAVE ---------- */
function saveProject(){
let name=document.getElementById('projName').value.trim();
if(!name){alert("Enter name");return;}

let store=JSON.parse(localStorage.getItem('buglens')||"{}");
store[name]={code:code.value};

localStorage.setItem('buglens',JSON.stringify(store));
loadSaved();
}

function loadSaved(){
let store=JSON.parse(localStorage.getItem('buglens')||"{}");
savedList.innerHTML="";

for(let k in store){
let d=document.createElement("div");
d.className="savedItem";

d.innerHTML="<span>"+k+"</span>";

let open=document.createElement("button");
open.innerText="Open";
open.onclick=()=>{code.value=store[k].code;updateLines();};

let del=document.createElement("button");
del.innerText="X";
del.onclick=()=>{delete store[k];localStorage.setItem('buglens',JSON.stringify(store));loadSaved();};

d.appendChild(open);
d.appendChild(del);
savedList.appendChild(d);
}
}

/* ---------- CLEAR ---------- */
function clearAll(){
code.value="";
out.innerHTML="<div class='box'>Write code and run</div>";
updateLines();
setStatus("Cleared");
}

loadSaved();
updateLines();

</script>

</body>
</html>
