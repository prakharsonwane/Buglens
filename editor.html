<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugLens</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#e2e8f0;
}

.top{
padding:10px;
background:#111827;
display:flex;
gap:8px;
flex-wrap:wrap;
align-items:center;
}

select,input,button{
padding:8px;
border:none;
border-radius:6px;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button.fix{
background:#3b82f6;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.editor{
width:50%;
display:flex;
background:#0b1220;
}

.lines{
width:50px;
background:#111827;
padding:10px;
text-align:right;
font-size:12px;
color:#64748b;
}

textarea{
width:100%;
background:#0b1220;
color:white;
border:none;
outline:none;
padding:10px;
font-family:monospace;
font-size:14px;
resize:none;
}

.panel{
width:50%;
padding:10px;
overflow:auto;
border-left:1px solid #1f2937;
}

.box{
background:#0b1220;
padding:10px;
border-radius:8px;
margin-top:10px;
white-space:pre-wrap;
}

.error{
background:#1e293b;
border-left:4px solid red;
padding:8px;
margin:6px 0;
}

.ok{
color:#22c55e;
}

.saveBox{
margin-top:10px;
background:#0b1220;
padding:10px;
border:1px solid #1f2937;
border-radius:8px;
}

.savedItem{
display:flex;
justify-content:space-between;
background:#111827;
padding:6px;
margin-top:5px;
border-radius:6px;
}
</style>

</head>

<body>

<div class="top">

<select id="lang">
<option value="python">Python</option>
<option value="c">C</option>
</select>

<button onclick="checkCode()">Check</button>
<button onclick="runCode()">Run</button>
<button class="fix" onclick="showSuggestions()">Suggestions</button>

<input id="projName" placeholder="Project name">
<button onclick="saveProject()">Save</button>

</div>

<div class="container">

<div class="editor">
<div class="lines" id="lines">1</div>
<textarea id="code" oninput="updateLines()"></textarea>
</div>

<div class="panel">

<div id="out" class="ok">Write code and run</div>

<div class="saveBox">
<b>Saved Projects</b>
<div id="savedList"></div>
</div>

</div>
</div>

<script>

let pyodide;
let pyReady = false;

const code=document.getElementById('code');
const lines=document.getElementById('lines');
const out=document.getElementById('out');
const savedList=document.getElementById('savedList');
const lang=document.getElementById('lang');

function updateLines(){
const c=code.value.split('\n').length;
let t='';
for(let i=1;i<=c;i++) t+=i+'<br>';
lines.innerHTML=t;
}

/* ---------------- LOAD PYODIDE FIXED ---------------- */
async function loadPy(){
try{
pyodide = await loadPyodide({
indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/"
});
pyReady = true;
}catch(e){
out.innerHTML="<div class='error'>Python failed to load (check internet)</div>";
}
}
loadPy();

/* ---------------- CHECK ---------------- */
function checkCode(){
const c=code.value;
let err=[];

if(!c.trim()){
out.innerHTML='<div class="error">Empty code</div>';
return;
}

if((c.match(/\(/g)||[]).length!=(c.match(/\)/g)||[]).length)
err.push('Bracket mismatch');

if((c.match(/\{/g)||[]).length!=(c.match(/\}/g)||[]).length)
err.push('Brace mismatch');

if(lang.value==='python'){
const l=c.split('\n');
for(let i=0;i<l.length;i++){
if(/^(if|for|while|def|else|elif)/.test(l[i]) && !l[i].trim().endsWith(':'))
err.push('Line '+(i+1)+' missing :');
}
}

if(lang.value==='c'){
if(!c.includes('#include')) err.push('Missing #include');
if(!c.includes('main')) err.push('Missing main()');
}

out.innerHTML = err.length
? "<div class='error'>"+err.join('<br>')+"</div>"
: "<div class='ok'>No issues found 🎉</div>";
}

/* ---------------- SUGGESTIONS ---------------- */
function showSuggestions(){
const c=code.value;
let s=[];

if(c.includes('main') && !c.includes('return'))
s.push("Add return 0;");

if(lang.value==='python' && c.includes('for') && !c.includes('print'))
s.push("Add print() inside loop");

if(lang.value==='c' && !c.includes('printf'))
s.push("Add printf() for output");

out.innerHTML=`
<div class="box">
🔧 Suggestions:<br><br>
${s.length ? s.map(x=>"• "+x).join("<br>") : "No suggestions 🎉"}
</div>
`;
}

/* ---------------- PYTHON FIXED RUN ---------------- */
async function runPython(c){

if(!pyReady){
out.innerHTML="<div class='error'>Python engine not loaded</div>";
return;
}

try{

out.innerHTML="<div class='box'>Running...</div>";

pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

await pyodide.runPythonAsync(c);

let result = pyodide.runPython("sys.stdout.getvalue()");

if(result && result.trim() !== ""){
out.innerHTML="<div class='box'>"+result+"</div>";
}else{
out.innerHTML="<div class='error'>no output</div>";
}

}catch(e){
out.innerHTML="<div class='error'>code may be incomplete or wrong</div>";
}
}

/* ---------------- C SIMULATION ---------------- */
function runC(code){

try{

let output = "";

// remove comments
let clean = code.replace(/\/\/.*$/gm, "");

// store int variables
let vars = {};
clean.replace(/int\s+(\w+)\s*=\s*([0-9]+)\s*;/g,(m,v,val)=>{
vars[v] = val;
});

// improved printf parser
let regex = /printf\s*\(\s*"([^"])"(?:\s,\s*(\w+))?\s*\)\s*;/g;

let match;

while((match = regex.exec(clean)) !== null){

let text = match[1];
let varName = match[2];

// handle %d properly
if(varName && vars[varName] !== undefined){
text = text.replace(/%d/g, vars[varName]);
}

// handle \n
text = text.replace(/\\n/g,"");

output += text + "\n";
}

output = output.trim();

if(output.length > 0){
out.innerHTML = "<div class='box'>" + output + "</div>";
}else{
out.innerHTML = "<div class='error'>no output</div>";
}

}catch(e){
out.innerHTML = "<div class='error'>code error</div>";
}

}

/* ---------------- RUN ---------------- */
function runCode(){

let c=code.value.trim();

if(!c){
out.innerHTML="<div class='error'>Code is empty</div>";
return;
}

if(lang.value==="python"){
runPython(c);
return;
}

runC(c);
}

/* INIT */
updateLines();

</script>

</body>
</html>
