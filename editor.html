<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugLens</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#e2e8f0;
}

.top{
padding:10px;
background:#111827;
display:flex;
gap:8px;
flex-wrap:wrap;
align-items:center;
}

select,input,button{
padding:8px;
border:none;
border-radius:6px;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button.fix{
background:#3b82f6;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.editor{
width:50%;
display:flex;
background:#0b1220;
}

.lines{
width:50px;
background:#111827;
padding:10px;
text-align:right;
font-size:12px;
color:#64748b;
}

textarea{
width:100%;
background:#0b1220;
color:white;
border:none;
outline:none;
padding:10px;
font-family:monospace;
font-size:14px;
resize:none;
}

.panel{
width:50%;
padding:10px;
overflow:auto;
border-left:1px solid #1f2937;
}

.box{
background:#0b1220;
padding:10px;
border-radius:8px;
white-space:pre-wrap;
margin-top:10px;
}

.error{
background:#1e293b;
border-left:4px solid red;
padding:8px;
margin:6px 0;
}

.ok{
color:#22c55e;
}

.saveBox{
margin-top:10px;
background:#0b1220;
padding:10px;
border:1px solid #1f2937;
border-radius:8px;
}

.savedItem{
display:flex;
justify-content:space-between;
background:#111827;
padding:6px;
margin-top:5px;
border-radius:6px;
}
</style>

</head>

<body>

<div class="top">

<select id="lang">
<option value="python">Python</option>
<option value="c">C</option>
</select>

<button onclick="checkCode()">Check</button>
<button onclick="runCode()">Run</button>
<button onclick="showSuggestions()">Suggestions</button>

<input id="projName" placeholder="Project name">
<button onclick="saveProject()">Save</button>

</div>

<div class="container">

<div class="editor">
<div class="lines" id="lines">1</div>
<textarea id="code"></textarea>
</div>

<div class="panel">

<div id="out" class="ok">Write code and run</div>

<div class="saveBox">
<b>Saved Projects</b>
<div id="savedList"></div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<script>

const code=document.getElementById("code");
const lines=document.getElementById("lines");
const out=document.getElementById("out");
const savedList=document.getElementById("savedList");
const lang=document.getElementById("lang");

code.addEventListener("input", updateLines);

function updateLines(){
let count=code.value.split("\n").length;
let t="";
for(let i=1;i<=count;i++) t+=i+"<br>";
lines.innerHTML=t;
}

/* SAFE ENTER + TAB */
code.addEventListener("keydown", function(e){

if(e.key==="Tab"){
e.preventDefault();
let s=this.selectionStart;
this.value=this.value.slice(0,s)+"    "+this.value.slice(s);
this.selectionStart=this.selectionEnd=s+4;
updateLines();
}

if(e.key==="Enter"){
e.preventDefault();

let v=this.value;
let pos=this.selectionStart;
let before=v.slice(0,pos);
let line=before.split("\n").pop() || "";

let indent="";
for(let i=0;i<line.length;i++){
if(line[i]===" ") indent+=" ";
else break;
}

if(line.trim().endsWith(":")){
indent+="    ";
}

this.value=v.slice(0,pos)+"\n"+indent+v.slice(pos);
this.selectionStart=this.selectionEnd=pos+1+indent.length;

updateLines();
}
});

/* LANGUAGE DETECT */
function detectLang(c){
let cScore=0,pyScore=0;
if(c.includes("#include")||c.includes("printf")) cScore++;
if(c.includes("print(")||c.includes("def ")) pyScore++;
return cScore>pyScore?"c":"python";
}

/* CHECK */
function checkCode(){
let c=code.value;
let err=[];

if(!c.trim()){
out.innerHTML="<div class='error'>Empty code</div>";
return;
}

if((c.match(/\(/g)||[]).length!=(c.match(/\)/g)||[]).length)
err.push("Bracket mismatch");

if((c.match(/\{/g)||[]).length!=(c.match(/\}/g)||[]).length)
err.push("Brace mismatch");

/* PYTHON */
if(lang.value==="python"){
let linesArr=c.split("\n");

for(let i=0;i<linesArr.length;i++){
if(linesArr[i].trim().endsWith(":")){
let next=linesArr[i+1];
if(next && !next.startsWith(" ")){
err.push("Line "+(i+1)+": indentation missing");
}
}
}
}

/* C */
if(lang.value==="c"){
if(!c.includes("#include")) err.push("Missing #include");
if(!c.includes("main")) err.push("Missing main()");
if(!c.includes("printf")) err.push("No output function printf()");
}

/* OUTPUT */
if(err.length){
out.innerHTML="<div class='error'>"+err.join("<br>")+"</div>";
}else{
out.innerHTML="<div class='ok'>No issues found 🎉</div>";
}
}

/* SUGGESTIONS */
function showSuggestions(){
let c=code.value;
let s=[];

if(c.includes("main") && !c.includes("return"))
s.push("Add return 0;");

if(lang.value==="c" && !c.includes("printf"))
s.push("Add printf()");

out.innerHTML="<div class='box'>"+(s.length?s.join("<br>"):"No suggestions 🎉")+"</div>";
}

/* SAVE SAFE */
function saveProject(){
let name=document.getElementById("projName").value.trim();
if(!name){alert("Enter name");return;}

let store=JSON.parse(localStorage.getItem("buglens")||"{}");

store[name]={
code:code.value||"",
lang:lang.value
};

localStorage.setItem("buglens",JSON.stringify(store));
loadSaved();
}

/* LOAD SAFE */
function loadSaved(){
let store=JSON.parse(localStorage.getItem("buglens")||"{}");
savedList.innerHTML="";

for(let k in store){

let d=document.createElement("div");
d.className="savedItem";

/* SAFE BUTTONS (NO undefined bug) */
d.innerHTML=
"<span>"+k+"</span>"+
"<button onclick=\"openP('"+k.replace(/'/g,"")+"\")\">Open</button>"+
"<button onclick=\"delP('"+k.replace(/'/g,"")+"\")\">X</button>";

savedList.appendChild(d);
}
}

/* OPEN SAFE */
function openP(n){
let store=JSON.parse(localStorage.getItem("buglens")||"{}");
if(!store[n]) return;

code.value=store[n].code||"";
lang.value=store[n].lang||"python";
updateLines();
}

/* DELETE SAFE */
function delP(n){
let store=JSON.parse(localStorage.getItem("buglens")||"{}");
if(!store[n]) return;

delete store[n];
localStorage.setItem("buglens",JSON.stringify(store));
loadSaved();
}

/* PYODIDE */
let pyodide;
let ready=false;

async function init(){
pyodide=await loadPyodide();
ready=true;
}
init();

async function runPython(c){
if(!ready){
out.innerHTML="<div class='error'>Python loading...</div>";
return;
}

try{
let r=await pyodide.runPythonAsync(c);
out.innerHTML="<div class='box'>"+r+"</div>";
}
catch(e){
out.innerHTML="<div class='error'>Code may be incomplete or missing statements</div>";
}
}

/* RUN */
function runCode(){
let c=code.value;

if(lang.value==="python"){
runPython(c);
return;
}

let output=[];
if(c.includes("printf")){
let m=c.match(/\"(.*?)\"/g);
if(m) m.forEach(x=>output.push(x.replace(/\"/g,"")));
}

out.innerHTML="<div class='box'>"+(output.length?output.join("\n"):"code may be incomplete")+"</div>";
}

updateLines();
loadSaved();

</script>

</body>
</html>
