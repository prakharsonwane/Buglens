<!DOCTYPE html>
<html>
<head>
<title>BugLens Pro</title>

<style>
body{
margin:0;
height:100vh;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
overflow:hidden;
color:white;
}

/* CANVAS */
canvas{
position:absolute;
top:0;
left:0;
}

/* HERO TOP TEXT */
#hero{
position:absolute;
top:70px;
text-align:center;
z-index:2;
}

#title{
font-size:52px;
font-weight:bold;
letter-spacing:2px;
color:#22c55e;
margin:0;
animation:glowPulse 3s infinite;
text-shadow:0 0 20px #22c55e;
}

#subtitle{
margin-top:10px;
font-size:16px;
color:#94a3b8;
opacity:0;
animation:fadeUp 1s ease forwards;
animation-delay:2s;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(-5px);
}
}

@keyframes glowPulse{
0%{text-shadow:0 0 10px #22c55e;}
50%{text-shadow:0 0 30px #22c55e, 0 0 60px #16a34a;}
100%{text-shadow:0 0 10px #22c55e;}
}

/* CARD */
.card{
z-index:2;
backdrop-filter:blur(25px);
background:rgba(255,255,255,0.06);
padding:35px;
border-radius:24px;
width:320px;
text-align:center;
border:1px solid rgba(34,197,94,0.2);
box-shadow:0 0 40px rgba(34,197,94,0.15);

transform:translateY(60px);
opacity:0;
transition:0.6s ease;
}

.show{
transform:translateY(0);
opacity:1;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#020617;
color:white;
outline:none;
transition:0.2s;
}

input:focus{
box-shadow:0 0 12px #22c55e;
transform:scale(1.02);
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
box-shadow:0 0 20px #22c55e;
transform:scale(1.03);
}

/* FEATURES */
#features{
font-size:13px;
opacity:0.7;
margin-bottom:15px;
color:#94a3b8;
line-height:1.6;
}

/* SUCCESS ANIMATION */
.success{
animation:zoomOut 0.6s forwards;
}

@keyframes zoomOut{
to{
transform:scale(2);
opacity:0;
}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- HERO -->
<div id="hero">
  <h1 id="title"></h1>
  <p id="subtitle">Build. Debug. Deploy. Like a Pro 🚀</p>
</div>

<!-- LOGIN CARD -->
<div class="card" id="card">

<div id="features">
⚡ Fast Python Runner <br>
💾 Save Projects <br>
🧠 Smart Suggestions
</div>

<p>Code. Debug. Build.</p>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Start Coding</button>

</div>

<script>

/* TYPEWRITER */
let text="Welcome to BugLens Pro";
let i=0;

function typing(){
if(i<text.length){
document.getElementById("title").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,60);
}else{
document.getElementById("card").classList.add("show");
}
}
typing();

/* PARTICLES */
let canvas=document.getElementById("bg");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<90;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(34,197,94,0.8)";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;
});

requestAnimationFrame(draw);
}
draw();

/* LOGIN */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("card").classList.add("success");

setTimeout(()=>{
window.location.href="editor.html";
},600);

}else{
alert("❌ Wrong login");
}
}
</script>

</body>
</html>
