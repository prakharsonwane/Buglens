<!DOCTYPE html>
<html>
<head>
<title>BugLens</title>

<style>
body {
margin:0;
height:100vh;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
overflow:hidden;
}

/* 🔥 Animated background blobs */
body::before, body::after{
content:"";
position:absolute;
width:300px;
height:300px;
background:linear-gradient(45deg,#22c55e,#3b82f6);
border-radius:50%;
filter:blur(120px);
animation:move 8s infinite alternate;
}

body::after{
background:linear-gradient(45deg,#ec4899,#f97316);
right:0;
animation-delay:2s;
}

@keyframes move{
from{transform:translateY(-50px);}
to{transform:translateY(50px);}
}

/* 🔥 Glass Card */
.card{
position:relative;
z-index:1;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
width:320px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

/* Title */
.card h1{
margin-bottom:5px;
font-size:26px;
color:#22c55e;
}

.card p{
font-size:12px;
opacity:0.7;
margin-bottom:20px;
}

/* Inputs */
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#020617;
color:white;
outline:none;
}

input:focus{
box-shadow:0 0 10px #22c55e;
}

/* Button */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #22c55e;
}

/* Footer */
.footer{
margin-top:15px;
font-size:11px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="card">
<h1>🚀 Welcome to BugLens</h1>
<p>Code. Debug. Build.</p>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Start Coding</button>

<div class="footer">Next-gen browser IDE ⚡</div>
</div>

<script>
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
window.location.href="editor.html";
}else{
alert("❌ Wrong login");
}
}
</script>

</body>
</html>
