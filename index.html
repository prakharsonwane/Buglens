<!DOCTYPE html>
<html>
<head>
  <title>Login - BugLens</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #1e3c72, #2a5298, #0f2027, #203a43);
      background-size: 400% 400%;
      animation: bg 10s ease infinite;
      color: white;
    }

    @keyframes bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ---------- MAIN CONTAINER ---------- */
    .container {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    /* ---------- LEFT SIDE (WELCOME) ---------- */
    .welcome {
      max-width: 350px;
    }

    .welcome h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #00c6ff;
    }

    .welcome p {
      font-size: 14px;
      opacity: 0.8;
    }

    .features {
      margin-top: 20px;
      font-size: 13px;
      line-height: 1.6;
      opacity: 0.9;
    }

    /* ---------- LOGIN BOX ---------- */
    .login-box {
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    input::placeholder {
      color: #ddd;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    /* ---------- FOOTER ---------- */
    .footer {
      font-size: 11px;
      margin-top: 10px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="welcome">
    <h1>🚀 Welcome to BugLens</h1>
    <p>Write, run and debug your Python code easily in your browser.</p>

    <div class="features">
      ⚡ Fast Python Runner<br>
      💾 Save Your Projects<br>
      🧠 Smart Code Suggestions<br>
      🎯 Beginner Friendly IDE
    </div>
  </div>

  <!-- LOGIN BOX -->
  <div class="login-box">
    <h2>🔐 Login</h2>

    <input id="user" type="text" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">🚀 Start Coding</button>

    <div class="footer">
      Built for learners 🚀
    </div>
  </div>

</div>

<script>
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (u === "admin" && p === "1234") {
    window.location.href = "editor.html";
  } else {
    alert("❌ Wrong Username or Password");
  }
}
</script>

</body>
</html>
