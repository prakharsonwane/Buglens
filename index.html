<!DOCTYPE html>
<html>
<head>
<title>BugLens</title>

<style>
body{
margin:0;
height:100vh;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
overflow:hidden;
color:white;
}

/* 🔥 PARTICLES */
canvas{
position:absolute;
top:0;
left:0;
}

/* 🔥 CARD */
.card{
position:relative;
z-index:1;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
width:320px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 30px rgba(0,0,0,0.5);

/* SLIDE */
animation: slideIn 1s ease forwards;
transform: translateX(200px);
opacity:0;
}

@keyframes slideIn{
to{
transform: translateX(0);
opacity:1;
}
}

/* 🔥 TITLE */
h1{
font-size:24px;
color:#22c55e;
margin-bottom:10px;
letter-spacing:1px;
text-shadow:0 0 10px #22c55e;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#020617;
color:white;
outline:none;
transition:0.2s;
}

input:focus{
box-shadow:0 0 12px #22c55e;
transform:scale(1.02);
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
position:relative;
overflow:hidden;
}

button:hover{
box-shadow:0 0 20px #22c55e;
}

/* RIPPLE */
button::after{
content:"";
position:absolute;
width:0;
height:0;
background:rgba(255,255,255,0.5);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
transition:0.4s;
}

button:active::after{
width:200px;
height:200px;
}

/* LOGIN SUCCESS */
.success{
animation: zoomOut 0.6s forwards;
}

@keyframes zoomOut{
to{
transform:scale(2);
opacity:0;
}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="card" id="card">
<h1 id="title"></h1>
<p>Code. Debug. Build.</p>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Start Coding</button>
</div>

<script>

/* 🔥 TYPING EFFECT */
let text="🚀 Welcome to BugLens";
let i=0;
function typing(){
if(i<text.length){
document.getElementById("title").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,50);
}
}
typing();

/* 🔥 PARTICLES */
let canvas=document.getElementById("bg");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#22c55e";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;
});

requestAnimationFrame(draw);
}
draw();

/* 🔥 LOGIN */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("card").classList.add("success");

setTimeout(()=>{
window.location.href="editor.html";
},600);

}else{
alert("❌ Wrong login");
}
}
</script>

</body>
</html>
