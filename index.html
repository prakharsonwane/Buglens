<!DOCTYPE html>
<html>
<head>
<title>BugLens Pro</title>
<div id="features">
⚡ Fast Python Runner <br>
💾 Save Projects <br>
🧠 Smart Suggestions
</div>
<style>
body{
margin:0;
height:100vh;
font-family:Arial;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#020617;
overflow:hidden;
color:white;
}

/* 🔥 PARTICLES */
canvas{
position:absolute;
top:0;
left:0;
}

/* 🔥 TITLE */
#title{
font-size:28px;
color:#22c55e;
margin-bottom:30px;
text-shadow:0 0 10px #22c55e;
z-index:1;
}

/* 🔥 CARD */
.card{
z-index:1;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
width:300px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 30px rgba(0,0,0,0.5);

/* SLIDE INIT (hidden) */
transform:translateX(200px);
opacity:0;
}

/* SHOW CLASS */
.show{
animation:slideIn 0.8s ease forwards;
}

@keyframes slideIn{
to{
transform:translateX(0);
opacity:1;
}
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#020617;
color:white;
outline:none;
transition:0.2s;
}

input:focus{
box-shadow:0 0 12px #22c55e;
transform:scale(1.02);
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 20px #22c55e;
}

/* SUCCESS */
.success{
animation:zoomOut 0.6s forwards;
}

@keyframes zoomOut{
to{
transform:scale(2);
opacity:0;
}
}
#features{
font-size:13px;
opacity:0.8;
margin-bottom:20px;
text-align:center;
line-height:1.6;
color:#94a3b8;
animation:fadeIn 1s ease forwards;
opacity:0;
}

@keyframes fadeIn{
to{
opacity:0.8;
}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1 id="title"></h1>

<div class="card" id="card">
<p>Code. Debug. Build.</p>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Start Coding</button>
</div>

<script>

/* 🔥 TYPING + THEN SHOW LOGIN */
let text="🚀 Welcome to BugLens";
let i=0;

function typing(){
if(i<text.length){
document.getElementById("title").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,50);
}else{
/* AFTER typing → show card */
document.getElementById("card").classList.add("show");
}
}

typing();

/* 🔥 PARTICLES */
let canvas=document.getElementById("bg");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#22c55e";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;
});

requestAnimationFrame(draw);
}
draw();

/* 🔥 LOGIN */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("card").classList.add("success");

setTimeout(()=>{
window.location.href="editor.html";
},600);

}else{
alert("❌ Wrong login");
}
}
</script>

</body>
</html>
